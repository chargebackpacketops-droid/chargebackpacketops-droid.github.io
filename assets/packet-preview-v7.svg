<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <!-- Minimal Clean Background -->
  <rect width="720" height="560" fill="#fcfcfc"/>
  
  <!-- Document Stack Shadow -->
  <rect x="190" y="80" width="360" height="440" rx="6" fill="rgba(0,0,0,0.04)" />
  
  <!-- Back Layer -->
  <rect x="205" y="70" width="360" height="440" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="245" y="100" width="120" height="6" rx="2" fill="#f0f0f0"/>

  <!-- Middle Layer -->
  <rect x="185" y="90" width="360" height="440" rx="4" fill="#ffffff" stroke="#d1d1d1" stroke-width="1"/>
  <rect x="225" y="120" width="140" height="6" rx="2" fill="rgba(51, 136, 255, 0.1)"/>
  
  <!-- Front Document Layer -->
  <rect x="160" y="110" width="360" height="420" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Header -->
  <text x="210" y="165" font-family="'Inter', sans-serif" font-size="16" font-weight="900" fill="#1a1a1a" letter-spacing="0.05em">CASE SUMMARY</text>
  <rect x="210" y="180" width="40" height="4" fill="#3388ff"/>
  
  <!-- Analysis Text Lines -->
  <rect x="210" y="210" width="260" height="6" rx="2" fill="#f5f5f5"/>
  <rect x="210" y="230" width="240" height="6" rx="2" fill="#f5f5f5"/>
  <rect x="210" y="250" width="260" height="6" rx="2" fill="#f5f5f5"/>
  
  <!-- Checklist Title -->
  <text x="210" y="310" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#3388ff" letter-spacing="0.02em">EVIDENCE INCLUDED</text>
  
  <!-- Checklist Items with Point Blue ticks -->
  <!-- Item 1 -->
  <rect x="210" y="325" width="16" height="16" rx="4" fill="rgba(51, 136, 255, 0.1)" stroke="#3388ff" stroke-width="1.5"/>
  <path d="M214 333 L 217 336 L 223 330" stroke="#3388ff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <rect x="238" y="330" width="150" height="6" rx="2" fill="#f0f0f0"/>
  
  <!-- Item 2 -->
  <rect x="210" y="355" width="16" height="16" rx="4" fill="rgba(51, 136, 255, 0.1)" stroke="#3388ff" stroke-width="1.5"/>
  <path d="M214 363 L 217 366 L 223 360" stroke="#3388ff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <rect x="238" y="360" width="180" height="6" rx="2" fill="#f0f0f0"/>
  
  <!-- Item 3 -->
  <rect x="210" y="385" width="16" height="16" rx="4" fill="rgba(51, 136, 255, 0.1)" stroke="#3388ff" stroke-width="1.5"/>
  <path d="M214 393 L 217 396 L 223 390" stroke="#3388ff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <rect x="238" y="390" width="130" height="6" rx="2" fill="#f0f0f0"/>

  <!-- Official READY stamp -->
  <g transform="translate(380, 420) rotate(-10)">
    <rect x="0" y="0" width="100" height="36" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="21" y="23" font-family="'Inter', sans-serif" font-size="14" font-weight="900" fill="#1a1a1a" letter-spacing="0.1em">READY</text>
  </g>
</svg>
