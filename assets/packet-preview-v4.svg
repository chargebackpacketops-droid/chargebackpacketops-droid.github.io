<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <!-- Dynamic Background Gradient Hint -->
  <rect width="720" height="560" fill="#fcfcfc"/>
  
  <!-- Central Transformation Core -->
  <rect x="240" y="160" width="240" height="320" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="260" y="180" width="200" height="280" rx="4" fill="rgba(51, 136, 255, 0.03)"/>
  
  <!-- Left Side: Source Fragments (Scattered Evidence) -->
  <!-- Fragment 1: Tracking -->
  <rect x="80" y="180" width="120" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="95" y="195" width="40" height="4" rx="2" fill="#3388ff" opacity="0.3"/>
  <rect x="95" y="205" width="90" height="4" rx="2" fill="#eeeeee"/>
  <path d="M200 200 C 220 200, 230 220, 240 240" stroke="#3388ff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  
  <!-- Fragment 2: Chat -->
  <rect x="60" y="260" width="140" height="60" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="85" cy="285" r="10" fill="#ff6b4a" opacity="0.1"/>
  <rect x="105" y="280" width="80" height="4" rx="2" fill="#eeeeee"/>
  <rect x="105" y="290" width="60" height="4" rx="2" fill="#eeeeee"/>
  <path d="M200 290 Q 220 290 240 300" stroke="#ff6b4a" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  
  <!-- Fragment 3: Policy -->
  <rect x="90" y="360" width="110" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="105" y="375" width="80" height="10" rx="2" fill="#3388ff" opacity="0.05"/>
  <path d="M200 380 Q 220 380 240 340" stroke="#3388ff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Right Side: The Output (Final Packet Value) -->
  <!-- Value 1: High Trust -->
  <rect x="520" y="140" width="140" height="36" rx="18" fill="#3388ff"/>
  <text x="548" y="163" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#ffffff" letter-spacing="0.05em">STRATEGIC</text>
  
  <!-- Value 2: PDF Export -->
  <rect x="500" y="220" width="160" height="50" rx="8" fill="#ffffff" stroke="#3388ff" stroke-width="2"/>
  <path d="M520 240 L 535 240 L 535 255" stroke="#3388ff" stroke-width="2" fill="none"/>
  <text x="550" y="250" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">EXPORT .PDF</text>
  
  <!-- Value 3: Win Rate Marker -->
  <rect x="540" y="320" width="100" height="100" rx="50" fill="rgba(51, 136, 255, 0.05)"/>
  <text x="565" y="360" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#3388ff">CHANCE</text>
  <text x="572" y="385" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#1a1a1a">HIGH</text>

  <!-- Core Packet Decoration -->
  <text x="275" y="225" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#1a1a1a" letter-spacing="0.1em">DISPUTE</text>
  <text x="275" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#1a1a1a" letter-spacing="0.1em">PACKET</text>
  <rect x="275" y="260" width="170" height="4" fill="#3388ff"/>
  
  <!-- Decorative Abstract UI elements -->
  <rect x="275" y="285" width="170" height="120" rx="4" fill="#f5f5f5" opacity="0.5"/>
  <circle cx="295" cy="305" r="6" fill="#3388ff"/>
  <circle cx="295" cy="325" r="6" fill="#3388ff"/>
  <circle cx="295" cy="345" r="6" fill="#ff6b4a" opacity="0.3"/>
</svg>
