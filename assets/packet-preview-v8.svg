<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <!-- Minimal Clean Background -->
  <rect width="720" height="560" fill="#ffffff"/>
  
  <!-- Shadow/Depth -->
  <rect x="180" y="80" width="380" height="440" rx="6" fill="rgba(0,0,0,0.03)" />
  
  <!-- Back Layer Documents -->
  <rect x="200" y="70" width="370" height="440" rx="4" fill="#ffffff" stroke="#e6e6e6" stroke-width="1"/>
  <rect x="190" y="80" width="370" height="440" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Main High-Def Dashboard Front -->
  <rect x="160" y="100" width="420" height="420" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Header Bar -->
  <rect x="160" y="100" width="420" height="56" rx="4 4 0 0" fill="#1a1a1a"/>
  <text x="190" y="135" font-family="'Inter', sans-serif" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="0.05em">DISPUTE EVIDENCE PACKET</text>
  <rect x="460" y="118" width="80" height="20" rx="10" fill="#3388ff"/>
  <text x="475" y="131" font-family="'Inter', sans-serif" font-size="9" font-weight="800" fill="#ffffff">READY</text>

  <!-- Split View Grid -->
  <!-- Left Side: Analysis/Summary -->
  <rect x="185" y="180" width="175" height="130" rx="4" fill="#ffffff" stroke="#e0e0e0" />
  <text x="200" y="205" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#1a1a1a">CASE SUMMARY</text>
  <rect x="200" y="218" width="140" height="4" rx="2" fill="var(--accent)" opacity="0.1" />
  <rect x="200" y="235" width="140" height="6" rx="2" fill="#f5f5f5" />
  <rect x="200" y="250" width="120" height="6" rx="2" fill="#f5f5f5" />
  <rect x="200" y="265" width="130" height="6" rx="2" fill="#f5f5f5" />
  
  <!-- Right Side: Evidence Gaps -->
  <rect x="380" y="180" width="175" height="130" rx="4" fill="#ffffff" stroke="#e0e0e0" />
  <text x="395" y="205" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#ff6b4a">EVIDENCE GAPS</text>
  
  <!-- Warning item -->
  <rect x="395" y="225" width="130" height="20" rx="4" fill="rgba(255, 107, 74, 0.05)" />
  <circle cx="406" cy="235" r="4" fill="#ff6b4a" />
  <rect x="418" y="232" width="90" height="6" rx="2" fill="rgba(255, 107, 74, 0.1)" />
  
  <rect x="395" y="255" width="130" height="20" rx="4" fill="#f9f9f9" />
  <circle cx="406" cy="265" r="4" fill="#3388ff" />
  <rect x="418" y="262" width="70" height="6" rx="2" fill="#f0f0f0" />

  <!-- Bottom: The Outcome / Draft Area -->
  <rect x="185" y="330" width="370" height="160" rx="4" fill="#fcfcfc" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2 2" />
  <text x="205" y="360" font-family="'Inter', sans-serif" font-size="12" font-weight="800" fill="#1a1a1a">DRAFT RESPONSE PREVIEW</text>
  <rect x="205" y="380" width="330" height="6" rx="2" fill="#eeeeee" />
  <rect x="205" y="395" width="300" height="6" rx="2" fill="#eeeeee" />
  <rect x="205" y="410" width="320" height="6" rx="2" fill="#eeeeee" />
  <rect x="205" y="425" width="240" height="6" rx="2" fill="#eeeeee" />
  
  <!-- Final Export Badge -->
  <g transform="translate(450, 440) rotate(-5)">
    <rect x="0" y="0" width="90" height="36" rx="4" fill="var(--accent)" />
    <text x="18" y="23" font-family="'Inter', sans-serif" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="0.05em">EXPORT PDF</text>
  </g>
</svg>
