<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <rect width="720" height="560" fill="#ffffff"/>

  <!-- Spread Backdrop Shadow -->
  <rect x="100" y="100" width="520" height="400" rx="40" fill="rgba(0,0,0,0.02)" />

  <!-- Left Page: The Analysis -->
  <g transform="translate(80, 80) rotate(-4)">
    <!-- Shadow -->
    <rect x="5" y="10" width="300" height="420" rx="4" fill="rgba(0,0,0,0.04)"/>
    <!-- Page -->
    <rect x="0" y="0" width="300" height="420" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5" />
    
    <text x="30" y="45" font-family="'Inter', sans-serif" font-size="14" font-weight="900" fill="#1a1a1a" letter-spacing="0.05em">ANALYSIS</text>
    <rect x="30" y="55" width="240" height="1" fill="#eeeeee" />
    
    <!-- Checklist -->
    <text x="30" y="85" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#3388ff">EVIDENCE CHECKLIST</text>
    <rect x="30" y="105" width="16" height="16" rx="4" fill="rgba(51, 136, 255, 0.1)" stroke="#3388ff" stroke-width="1.5"/>
    <rect x="55" y="110" width="180" height="6" rx="2" fill="#f5f5f5"/>
    
    <rect x="30" y="135" width="16" height="16" rx="4" fill="rgba(51, 136, 255, 0.1)" stroke="#3388ff" stroke-width="1.5"/>
    <rect x="55" y="140" width="160" height="6" rx="2" fill="#f5f5f5"/>
    
    <!-- Gap -->
    <rect x="30" y="175" width="16" height="16" rx="4" fill="rgba(255, 107, 74, 0.1)" stroke="#ff6b4a" stroke-width="1.5"/>
    <rect x="55" y="180" width="140" height="6" rx="2" fill="rgba(255, 107, 74, 0.1)"/>
    <text x="210" y="186" font-family="'Inter', sans-serif" font-size="8" font-weight="900" fill="#ff6b4a">MISSING</text>
    
    <!-- Analysis Graph -->
    <rect x="30" y="240" width="240" height="120" rx="4" fill="#fcfcfc" stroke="#eeeeee" />
    <path d="M50 330 L 100 280 L 150 310 L 250 260" stroke="#3388ff" stroke-width="2" stroke-linecap="round" fill="none" />
    <text x="50" y="255" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#1a1a1a" opacity="0.4">WIN PROBABILITY TREND</text>
  </g>

  <!-- Right Page: The Final Packet (Overlaps Left) -->
  <g transform="translate(340, 60) rotate(2)">
    <!-- Shadow -->
    <rect x="-10" y="10" width="320" height="440" rx="4" fill="rgba(0,0,0,0.06)"/>
    <!-- Page -->
    <rect x="0" y="0" width="320" height="440" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
    
    <!-- Editor Header -->
    <rect x="0" y="0" width="320" height="50" rx="4 4 0 0" fill="#1a1a1a"/>
    <!-- fix corner -->
    <path d="M0 4 Q 0 0 4 0 L 316 0 Q 320 0 320 4 L 320 50 L 0 50 Z" fill="#1a1a1a"/>
    <text x="25" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="#ffffff" letter-spacing="0.05em">FINAL RESPONSE</text>
    
    <!-- Body Content Skeleton -->
    <rect x="25" y="80" width="270" height="8" rx="2" fill="#f5f5f5" />
    <rect x="25" y="100" width="250" height="8" rx="2" fill="#f5f5f5" />
    <rect x="25" y="120" width="270" height="8" rx="2" fill="#f5f5f5" />
    <rect x="25" y="140" width="260" height="8" rx="2" fill="#f5f5f5" />
    
    <rect x="25" y="180" width="270" height="8" rx="2" fill="#f5f5f5" />
    <rect x="25" y="200" width="240" height="8" rx="2" fill="#f5f5f5" />
    <rect x="25" y="220" width="180" height="8" rx="2" fill="#f5f5f5" />
    
    <!-- Ready Stamp -->
    <g transform="translate(190, 310) rotate(-10)">
      <rect x="0" y="0" width="100" height="40" rx="4" fill="none" stroke="#3388ff" stroke-width="2.5" stroke-dasharray="4 4"/>
      <text x="21" y="26" font-family="'Inter', sans-serif" font-size="16" font-weight="900" fill="#3388ff">READY</text>
    </g>

    <rect x="25" y="380" width="120" height="36" rx="4" fill="#3388ff" />
    <text x="45" y="403" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#ffffff">DOWNLOAD</text>
  </g>
</svg>
