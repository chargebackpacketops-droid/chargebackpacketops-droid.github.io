<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <rect width="720" height="560" fill="#ffffff"/>
  
  <!-- Folder Back Cover -->
  <path d="M120 120 L 600 120 L 600 480 L 120 480 L 120 180 L 100 160 L 100 120 Z" fill="#eeeeee" stroke="#d1d1d1" stroke-width="1.5"/>
  
  <!-- Documents Inside -->
  <!-- Doc 1 -->
  <rect x="140" y="80" width="380" height="420" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="170" y="110" width="120" height="6" rx="2" fill="rgba(51, 136, 255, 0.1)"/>
  
  <!-- Doc 2 (The Key Result) -->
  <rect x="165" y="110" width="400" height="420" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="200" y="150" width="180" height="12" rx="2" fill="#1a1a1a" />
  <text x="200" y="195" font-family="'Inter', sans-serif" font-size="16" font-weight="900" fill="#1a1a1a" letter-spacing="0.05em">CHARGEBACK PACKET</text>
  <rect x="200" y="210" width="40" height="6" fill="#3388ff" />
  
  <!-- Brief Checklist on Doc -->
  <rect x="200" y="250" width="12" height="12" rx="3" fill="#3388ff" />
  <rect x="225" y="253" width="180" height="6" rx="2" fill="#f5f5f5" />
  
  <rect x="200" y="275" width="12" height="12" rx="3" fill="#3388ff" />
  <rect x="225" y="278" width="220" height="6" rx="2" fill="#f5f5f5" />
  
  <rect x="200" y="300" width="12" height="12" rx="3" fill="#ff6b4a" />
  <rect x="225" y="303" width="140" height="6" rx="2" fill="rgba(255, 107, 74, 0.1)" />

  <!-- Folder Front Cover (Angular/Dynamic) -->
  <path d="M80 520 L 240 180 L 460 180 L 520 520 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5" />
  <g transform="translate(140, 340) rotate(-10)">
    <rect x="0" y="0" width="180" height="100" rx="4" fill="#f9f9f9" stroke="#1a1a1a" stroke-width="1.5" />
    <text x="20" y="40" font-family="'Inter', sans-serif" font-size="11" font-weight="800" fill="#1a1a1a" opacity="0.6">PROJECT CODE</text>
    <text x="20" y="70" font-family="'Inter', sans-serif" font-size="20" font-weight="900" fill="#3388ff" letter-spacing="-0.02em">CB_PACKET</text>
  </g>

  <!-- Ready Stamp Outside -->
  <g transform="translate(480, 420) rotate(-15)">
    <rect x="0" y="0" width="120" height="48" rx="4" fill="#ffffff" stroke="#3388ff" stroke-width="3" stroke-dasharray="6 6"/>
    <text x="22" y="32" font-family="'Inter', sans-serif" font-size="20" font-weight="900" fill="#3388ff" letter-spacing="0.1em">READY</text>
  </g>
</svg>
