<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <!-- Background matches V2 beige hint -->
  <rect width="720" height="560" fill="#fcfcfc"/>
  
  <!-- Subtle Shadow behind stack -->
  <rect x="160" y="100" width="360" height="420" rx="4" fill="rgba(0,0,0,0.03)" />
  
  <!-- Back Document (Third Layer) -->
  <rect x="180" y="80" width="360" height="420" rx="4" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="210" y="110" width="100" height="8" rx="2" fill="#f5f5f5"/>
  
  <!-- Middle Document (Second Layer) -->
  <rect x="170" y="90" width="360" height="420" rx="4" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="200" y="125" width="140" height="10" rx="2" fill="#3388ff" opacity="0.1"/>
  <rect x="200" y="150" width="300" height="6" rx="2" fill="#eeeeee"/>
  
  <!-- Main Front Document (Top Layer) -->
  <rect x="160" y="100" width="360" height="420" rx="4" fill="#ffffff" stroke="#d1d1d1" stroke-width="1.5"/>
  
  <!-- CASE SUMMARY Heading -->
  <text x="190" y="145" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#1a1a1a" letter-spacing="0.05em">CASE SUMMARY</text>
  <rect x="190" y="155" width="300" height="2" fill="#3388ff"/>
  
  <!-- Content Lines -->
  <rect x="190" y="180" width="300" height="6" rx="2" fill="#f5f5f5"/>
  <rect x="190" y="195" width="280" height="6" rx="2" fill="#f5f5f5"/>
  <rect x="190" y="210" width="300" height="6" rx="2" fill="#f5f5f5"/>
  
  <!-- CHECKLIST SECTION -->
  <text x="190" y="255" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#3388ff">EVIDENCE CHECKLIST</text>
  
  <!-- Blue Items -->
  <circle cx="200" cy="280" r="4" fill="#3388ff"/>
  <rect x="215" y="277" width="180" height="6" rx="2" fill="#f0f4f8"/>
  
  <circle cx="200" cy="300" r="4" fill="#3388ff"/>
  <rect x="215" y="297" width="160" height="6" rx="2" fill="#f0f4f8"/>
  
  <!-- Rust (Warning) Items -->
  <circle cx="200" cy="320" r="4" fill="#ff6b4a"/>
  <rect x="215" y="317" width="210" height="6" rx="2" fill="rgba(255, 107, 74, 0.1)"/>
  <text x="435" y="322" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#ff6b4a">MISSING</text>
  
  <!-- Footer Response Draft -->
  <rect x="190" y="360" width="300" height="100" rx="4" fill="#f9f9f9" stroke="#eeeeee"/>
  <text x="210" y="385" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1a1a1a">RESPONSE DRAFT</text>
  <rect x="210" y="400" width="260" height="4" rx="2" fill="#eeeeee"/>
  <rect x="210" y="412" width="240" height="4" rx="2" fill="#eeeeee"/>
  <rect x="210" y="424" width="260" height="4" rx="2" fill="#eeeeee"/>
  
  <!-- READY Stamp -->
  <rect x="420" y="420" width="70" height="30" rx="2" fill="none" stroke="#3388ff" stroke-width="2" stroke-dasharray="2 2" transform="rotate(-5, 455, 435)"/>
  <text x="430" y="440" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#3388ff" transform="rotate(-5, 455, 435)">READY</text>
</svg>
